<script>
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 20));

  const navToggle = document.getElementById('navToggle');
  const navLinks  = document.getElementById('navLinks');
  navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
  document.addEventListener('click', (e) => {
    if (!navbar.contains(e.target)) navLinks.classList.remove('open');
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

<script>
const logoEl = document.querySelector('.logo-type');
const word = 'Noor.';
let i = 0;
const colors = ['#346739','#408A71','#285A48','#346739'];
let colorIndex = 0;

function typeLogo() {
  if (!logoEl) return;
  logoEl.textContent = word.slice(0, i);
  i++;
  if (i <= word.length) {
    setTimeout(typeLogo, 150);
  } else {
    setTimeout(startShimmer, 400);
  }
}

function startShimmer() {
  logoEl.style.transition = 'color 0.8s ease';
  function cycleColor() {
    colorIndex = (colorIndex + 1) % colors.length;
    logoEl.style.color = colors[colorIndex];
    setTimeout(cycleColor, 900);
  }
  cycleColor();
}
typeLogo();
</script>

<script>
const canvas = document.getElementById('particles-canvas');
if (canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const COLORS = ['#346739','#408A71','#A0D585','#9FCB98','#285A48','#79AE6F'];
  const SHAPES = ['circle','diamond','cross','circle','circle'];
  const particles = [];
  const COUNT = 65;

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.55,
      vy: (Math.random() - 0.5) * 0.55,
      r: Math.random() * 3.5 + 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
      opacity: Math.random() * 0.5 + 0.3
    });
  }

  function drawShape(p) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    ctx.strokeStyle = p.color;
    ctx.translate(p.x, p.y);
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.shape === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(0, -p.r * 1.5);
      ctx.lineTo(p.r, 0);
      ctx.lineTo(0, p.r * 1.5);
      ctx.lineTo(-p.r, 0);
      ctx.closePath();
      ctx.fill();
    } else if (p.shape === 'cross') {
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-p.r * 1.2, 0);
      ctx.lineTo(p.r * 1.2, 0);
      ctx.moveTo(0, -p.r * 1.2);
      ctx.lineTo(0, p.r * 1.2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.save();
          ctx.globalAlpha = 0.15 * (1 - dist / 120);
          ctx.strokeStyle = '#346739';
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    particles.forEach(p => {
      drawShape(p);
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
